name: Validate data

# The shared safety net (scaling-plan §6.4). Guards the coach's direct-to-main
# lane — training/state.md, sleep_log.json, challenge_v2.json, sessions/** are
# committed to main without a PR (SOUL.md / Layer B §2, §13). A malformed or
# contract-breaking file would break the Vercel dashboard build unreviewed.
#
# Both runtimes pass through the SAME gate: a BYO Claude Code session runs
# scripts/validate-repo.py as its VALIDATE capability before commit, and this
# workflow re-runs it on the push to main as the backstop. Severity is graduated
# (see docs/soul-split-m0.md): ERROR fails the build; WARNING surfaces pre-existing drift
# without failing, so extending the checks never reds a live repo on a false
# positive. Also verifies the generated SOUL.md is in sync with soul/*.md.

on:
  push:
    branches: [main]
    paths:
      - 'training/challenge_v2.json'
      - 'training/state.md'
      - 'training/sleep_log.json'
      - 'sessions/*.json'
      - 'SOUL.md'
      - 'soul/**'
      - 'scripts/compose-soul.mjs'
      - 'scripts/validate-repo.py'
  pull_request:
    paths:
      - 'training/challenge_v2.json'
      - 'training/state.md'
      - 'training/sleep_log.json'
      - 'sessions/*.json'
      - 'SOUL.md'
      - 'soul/**'
      - 'scripts/compose-soul.mjs'
      - 'scripts/validate-repo.py'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate data contracts (+ SOUL drift)
        run: python3 scripts/validate-repo.py --repo . --format github

  self-test:
    # The validator must pass its own fixtures: a valid mini-repo passes, and a
    # deliberately broken one fails. Proves the safety net actually catches things.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Fixtures — valid repo passes
        run: python3 scripts/validate-repo.py --repo .github/validation-fixtures/valid
      - name: Fixtures — broken repo fails (expected non-zero)
        run: |
          if python3 scripts/validate-repo.py --repo .github/validation-fixtures/broken; then
            echo "::error::broken fixture unexpectedly PASSED — validator is not catching errors"
            exit 1
          else
            echo "broken fixture correctly failed"
          fi
